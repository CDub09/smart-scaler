<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartScaler Pro | Precision Batch Utility</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXX"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-XXXX');</script>

    <style>
        :root { --primary: #1b4332; --accent: #d8f3dc; --warning: #e63946; --text: #2d3436; }
        body { font-family: -apple-system, sans-serif; background: #f8f9fa; color: var(--text); padding-bottom: 140px; margin: 0; }
        .container { max-width: 700px; margin: 20px auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); position: relative; }
        
        .yield-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: var(--accent); padding: 15px; border-radius: 10px; margin: 20px 0; }
        input, select { width: 100%; padding: 12px; border: 1px solid #dfe6e9; border-radius: 8px; margin-top: 5px; font-size: 16px; }
        .ingredient-row { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; margin-bottom: 12px; }
        
        .btn-add { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-remove { background: none; border: none; color: #ccc; cursor: pointer; font-size: 20px; }

        #save-indicator { position: absolute; top: 10px; right: 20px; color: #00b894; font-size: 10px; font-weight: bold; display: none; }
        
        /* Alerts & Results */
        .batch-alert { background: #fff3cd; color: #856404; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; line-height: 1.4; border-left: 4px solid #ffc107; }
        .result-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f1f1f1; align-items: center; }
        .egg-tip { display: block; font-size: 11px; color: #636e72; font-style: italic; margin-top: 4px; }

        /* Fixed Legal/Safety Footer */
        .master-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #2d3436; color: #dfe6e9; padding: 15px 0; font-size: 11px; text-align: center; border-top: 4px solid var(--warning); z-index: 1000; }
        .legal-links a { color: #81ecec; text-decoration: none; margin: 0 10px; }

        @media print { .no-print, .master-footer { display: none !important; } .container { box-shadow: none; margin: 0; padding: 0; } }
    </style>
</head>
<body>

<div class="container">
    <div id="save-indicator">✓ AUTO-SAVED</div>
    <div class="no-print">
        <h1 style="color: var(--primary); margin: 0 0 5px 0;">SmartScaler Pro</h1>
        <p style="font-size: 14px; color: #636e72; margin-bottom: 20px;">The Professional Standard for Any Recipe Size.</p>
        
        <div class="yield-grid">
            <div><label>Original Servings</label><input type="number" id="origYield" value="1" oninput="calculate()"></div>
            <div><label>Desired Servings</label><input type="number" id="newYield" value="10" oninput="calculate()"></div>
        </div>
        
        <div id="ingredient-list"></div>
        <button class="btn-add" onclick="addRow()">+ Add Ingredient</button>
    </div>

    <div id="results-section" style="margin-top:30px;">
        <h2 style="text-align:center; border-bottom: 2px solid var(--accent); padding-bottom: 10px;">Scaled Prep Sheet</h2>
        <div id="results-list"></div>
    </div>
</div>

<div class="master-footer no-print">
    <div style="margin-bottom: 5px; padding: 0 15px;">
        <strong>SAFETY:</strong> Scaling math is for ratios. Verify cooking times & temperatures.
    </div>
    <div class="legal-links">
        <a href="#" onclick="alert('All recipe data is stored LOCALLY in your browser. We never see or store your ingredients.')">Privacy</a> | 
        <a href="#" onclick="alert('SmartScaler is a mathematical tool. User assumes all responsibility for food safety.')">Terms</a> | 
        <a href="mailto:support@yourdomain.com">Support</a>
    </div>
</div>

<script>
    let ingredients = JSON.parse(localStorage.getItem('smartScalerV2.4')) || [
        { name: "Flour", amount: 2, unit: "cups" },
        { name: "Large Eggs", amount: 1, unit: "count" },
        { name: "Salt", amount: 0.5, unit: "tsp" }
    ];

    function save() { 
        localStorage.setItem('smartScalerV2.4', JSON.stringify(ingredients)); 
        const ind = document.getElementById('save-indicator');
        ind.style.display = 'block'; setTimeout(() => ind.style.display = 'none', 1500);
    }

    function addRow() { ingredients.push({ name: "", amount: 1, unit: "cups" }); render(); }
    function removeRow(i) { ingredients.splice(i, 1); render(); save(); }
    function update(i, f, v) { ingredients[i][f] = v; save(); calculate(); }

    function render() {
        const list = document.getElementById('ingredient-list');
        list.innerHTML = '';
        ingredients.forEach((ing, i) => {
            const div = document.createElement('div');
            div.className = 'ingredient-row';
            div.innerHTML = `
                <input type="text" placeholder="Item" value="${ing.name}" oninput="update(${i}, 'name', this.value)">
                <input type="number" step="any" value="${ing.amount}" oninput="update(${i}, 'amount', parseFloat(this.value))">
                <select onchange="update(${i}, 'unit', this.value)">
                    <option value="cups" ${ing.unit==='cups'?'selected':''}>cups</option>
                    <option value="tsp" ${ing.unit==='tsp'?'selected':''}>tsp</option>
                    <option value="tbsp" ${ing.unit==='tbsp'?'selected':''}>tbsp</option>
                    <option value="grams" ${ing.unit==='grams'?'selected':''}>grams</option>
                    <option value="oz" ${ing.unit==='oz'?'selected':''}>oz</option>
                    <option value="count" ${ing.unit==='count'?'selected':''}>count</option>
                </select>
                <button class="btn-remove" onclick="removeRow(${i})">×</button>`;
            list.appendChild(div);
        });
        calculate();
    }

    function calculate() {
        const orig = parseFloat(document.getElementById('origYield').value) || 1;
        const target = parseFloat(document.getElementById('newYield').value) || 1;
        const factor = target / orig;
        const resList = document.getElementById('results-list');
        resList.innerHTML = '';

        // BI-DIRECTIONAL LOGIC: Small Batch Warnings
        if (factor < 0.25) {
            resList.innerHTML += `<div class="batch-alert"><strong>📉 Small Batch Note:</strong> You are reducing this recipe significantly. Evaporation happens faster in small pots; monitor liquids closely and check doneness 20% earlier.</div>`;
        } else if (factor > 4) {
            resList.innerHTML += `<div class="batch-alert" style="background:#d1ecf1; color:#0c5460; border-color:#bee5eb;"><strong>📈 Large Batch Note:</strong> Smart-Scaling is active. We recommend checking spice levels as they don't always scale linearly.</div>`;
        }

        ingredients.forEach(ing => {
            if (!ing.name) return;
            let scaled = ing.amount * factor;
            let tip = "";

            // FRACTIONAL EGG LOGIC
            if (ing.name.toLowerCase().includes("egg") && !Number.isInteger(scaled)) {
                tip = `<span class="egg-tip">Tip: Whisk 1 egg and use ${scaled.toFixed(2)} of it by weight/volume.</span>`;
            }

            // SMART SALT/SODA LOGIC for Large Batches
            if ((ing.name.toLowerCase().includes("salt") || ing.name.toLowerCase().includes("soda")) && factor > 4) {
                scaled *= 0.85; // Safety cap
                tip = `<span class="egg-tip" style="color:var(--warning)">Smart-Scaled for bulk.</span>`;
            }

            resList.innerHTML += `<div class="result-item">
                <div><strong>${ing.name}</strong>${tip}</div>
                <div style="font-weight:bold; color:var(--primary);">${scaled.toFixed(2)} ${ing.unit}</div>
            </div>`;
        });
    }
    render();
</script>
</body>
</html>
